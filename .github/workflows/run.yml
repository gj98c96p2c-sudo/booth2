name: BOOTH Monitor Bot

# 外部の正確なタイマー（cron-job.org等）からAPI経由で呼び出すため、手動実行トリガーのみを設定
on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # ※requirements.txtがない環境でのエラーを防ぐためキャッシュは無効化

      - name: 必要なパッケージのインストール
        run: |
          pip install requests beautifulsoup4

      - name: ボットの実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python booth_bot.py

      - name: 既読リストの変更を保存 (Commit & Push)
        run: |
          # GitHub Actionsの公式Botをユーザーとして設定
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add seen_items.txt
          # 変更がある場合のみコミットとプッシュを実行（エラー回避）
          git diff --staged --quiet || (git commit -m "Update seen items" && git push)
