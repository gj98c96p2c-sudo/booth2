name: BOOTH Auto Notifier

on:
  schedule:
    # ⏱️ 1時間に1回、自動で起動する設定（世界標準時なので、日本時間の毎時0分頃に動きます）
    - cron: '0 * * * *'
  workflow_dispatch: # ボタンを押して手動で今すぐ動かすこともできるようにする設定

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 既読リスト(seen_items.txt)を書き換えて保存するために必要

    steps:
    - name: コードをダウンロード
      uses: actions/checkout@v4

    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 工具箱のインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: ボットを実行
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python booth_bot.py

    - name: 既読リスト(seen_items.txt)に更新があればGitHubに自動保存
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add seen_items.txt || true
        git commit -m "Update seen_items.txt" || true
        git push || true
