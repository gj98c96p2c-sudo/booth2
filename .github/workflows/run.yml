name: BOOTH Monitor Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: ["*"]
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4
        with:
          # 💡 過去の履歴をすべて取得し、安全に合体（プル）できるようにします
          fetch-depth: 0

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なパッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: ボットの実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python booth_bot.py

      - name: 既読リストの変更を保存 (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_items.txt
          if ! git diff --cached --quiet; then
            git commit -m "🤖 既読リストの更新 [skip ci]"
            # 💡 送信する直前に、ブラウザで書き換えられた最新のコードを自動で取り込んで安全に合体させます！
            git pull --rebase origin main
            git push origin main
          else
            echo "既読リストに変更はありません。"
          fi
