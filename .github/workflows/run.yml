name: VRC Finder API Monitor Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: ["*"]
  schedule:
    - cron: '*/15 * * * *' # 15分おきの爆速検知に復活！

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なパッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ボットの実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python booth_bot.py

      # 今までの完璧なGit Commit & Push機構をそのまま利用
      - name: 既読リストの変更を保存 (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_items.txt
          if ! git diff --cached --quiet; then
            git commit -m "🤖 既読リストの更新 [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "既読リストに変更はありません。"
          fi
