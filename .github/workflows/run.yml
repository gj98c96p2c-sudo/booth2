name: VRChat Booth Bot

on:
  schedule:
    # 🕒 15分おきに自動実行する設定
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # 🛠️ 手動起動ボタン用

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      # 1. リポジトリのダウンロード
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Pythonのセットアップ（★ここを修正しました！）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 必要なライブラリをインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 暗号URLを読み込んで実行
      - name: Run Booth Bot
        env:
          DISCORD_WEBHOOK_URL:     ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_SPRING:   ${{ secrets.DISCORD_WEBHOOK_SPRING }}
          DISCORD_WEBHOOK_SUMMER:   ${{ secrets.DISCORD_WEBHOOK_SUMMER }}
          DISCORD_WEBHOOK_AUTUMN:   ${{ secrets.DISCORD_WEBHOOK_AUTUMN }}
          DISCORD_WEBHOOK_WINTER:   ${{ secrets.DISCORD_WEBHOOK_WINTER }}
        run: python booth_bot.py

      # 5. 既読リストを保存して書き戻す
      - name: Commit and Push seen_items.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "seen_items.txt" ]; then
            git add seen_items.txt
            git commit -m "Update seen items [skip ci]" || echo "No changes to commit"
            git push
          fi
