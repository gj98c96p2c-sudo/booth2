name: BOOTH Monitor Bot

on:
  schedule:
    - cron: '0 * * * *' # 1時間ごとに自動実行
  workflow_dispatch: # 手動実行ボタン

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🌟ここが超重要！ファイルを上書き保存する権限

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なパッケージのインストール
        run: |
          pip install requests beautifulsoup4

      - name: ボットの実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python booth_bot.py

      - name: 既読リストの変更を保存 (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_items.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen items" && git push)
